# ══════════════════════════════════════════════════════════════════
# APPLICATION PROPERTIES — Spring Boot Configuration File
# ══════════════════════════════════════════════════════════════════
# This file is automatically loaded by Spring Boot at startup.
# It configures how your application behaves.
# ══════════════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────────────
# APPLICATION NAME & SERVER PORT
# ──────────────────────────────────────────────────────────────────
# spring.application.name → Identifies your app in logs and monitoring
# server.port → The port Tomcat listens on (default is 8080)
#   Access your APIs at: http://localhost:8080
spring.application.name=banking-system
server.port=8080

# ──────────────────────────────────────────────────────────────────
# DATABASE CONNECTION (MySQL)
# ──────────────────────────────────────────────────────────────────
# spring.datasource.url → JDBC connection string
#   Format: jdbc:mysql://HOST:PORT/DATABASE_NAME
#   - localhost → MySQL is on the same machine
#   - 3306 → Default MySQL port
#   - banking_system → The database we'll create
#   - useSSL=false → Disable SSL for local development
#   - serverTimezone=UTC → Avoid timezone-related errors
#   - allowPublicKeyRetrieval=true → Required for MySQL 8+ authentication
#
# spring.datasource.username → MySQL login username
# spring.datasource.password → MySQL login password
#   ⚠️  IMPORTANT: Change 'root' password to YOUR MySQL password!
#
# spring.datasource.driver-class-name → Tells Spring which JDBC driver to use
spring.datasource.url=jdbc:mysql://localhost:3306/banking_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Bef@re1225
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ──────────────────────────────────────────────────────────────────
# JPA / HIBERNATE CONFIGURATION
# ──────────────────────────────────────────────────────────────────
# spring.jpa.hibernate.ddl-auto → Controls how Hibernate manages the schema
#   Options:
#   - none     → Do nothing (production)
#   - validate → Only validate, don't change schema
#   - update   → Update schema without dropping tables (DEVELOPMENT)
#   - create   → Drop and recreate tables on every startup
#   - create-drop → Create on startup, drop on shutdown
#
#   We use 'update' so Hibernate automatically creates/modifies tables
#   based on our @Entity classes. Perfect for development!
#
# spring.jpa.show-sql → Print generated SQL in console (helps debugging)
#
# spring.jpa.properties.hibernate.format_sql → Format the SQL for readability
#
# spring.jpa.properties.hibernate.dialect → Tells Hibernate which SQL dialect
#   to generate. MySQL8Dialect generates MySQL 8 compatible SQL.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ──────────────────────────────────────────────────────────────────
# LOGGING
# ──────────────────────────────────────────────────────────────────
# Show useful debug info during development
logging.level.com.banking=DEBUG
logging.level.org.springframework.web=DEBUG
